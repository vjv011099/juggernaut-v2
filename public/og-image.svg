<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Outfit', 'Inter', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0F1E"/>

  <!-- Teal radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0CC0DF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0A0F1E" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top-left grid dots (decorative) -->
  <g fill="#0CC0DF" opacity="0.10">
    <circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/>
    <circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="120" cy="160" r="2"/><circle cx="160" cy="160" r="2"/>
  </g>
  <!-- Bottom-right grid dots -->
  <g fill="#0CC0DF" opacity="0.10">
    <circle cx="1040" cy="470" r="2"/><circle cx="1080" cy="470" r="2"/><circle cx="1120" cy="470" r="2"/>
    <circle cx="1040" cy="510" r="2"/><circle cx="1080" cy="510" r="2"/><circle cx="1120" cy="510" r="2"/>
    <circle cx="1040" cy="550" r="2"/><circle cx="1080" cy="550" r="2"/><circle cx="1120" cy="550" r="2"/>
  </g>

  <!-- Top teal accent bar -->
  <rect x="80" y="60" width="48" height="3" rx="2" fill="#0CC0DF"/>

  <!-- Logo / Brand name -->
  <text x="80" y="160" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Juggernaut</text>
  <text x="80" y="220" font-size="52" font-weight="800" fill="#0CC0DF" letter-spacing="-1">Global</text>

  <!-- Divider line -->
  <rect x="80" y="252" width="560" height="1" fill="rgba(255,255,255,0.10)"/>

  <!-- Tagline -->
  <text x="80" y="298" font-size="22" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0">
    AI-powered global expansion for Indian D2C brands.
  </text>

  <!-- Sub tagline -->
  <text x="80" y="336" font-size="18" font-weight="400" fill="rgba(255,255,255,0.38)">
    Germany · USA · UAE · UK · 50+ marketplaces
  </text>

  <!-- Stats row -->
  <g>
    <!-- Stat 1 -->
    <rect x="80" y="390" width="180" height="74" rx="10" fill="rgba(12,192,223,0.08)" stroke="rgba(12,192,223,0.20)" stroke-width="1"/>
    <text x="170" y="422" font-size="28" font-weight="800" fill="#0CC0DF" text-anchor="middle">4%</text>
    <text x="170" y="448" font-size="12" font-weight="500" fill="rgba(255,255,255,0.40)" text-anchor="middle">Performance fee</text>

    <!-- Stat 2 -->
    <rect x="276" y="390" width="180" height="74" rx="10" fill="rgba(12,192,223,0.08)" stroke="rgba(12,192,223,0.20)" stroke-width="1"/>
    <text x="366" y="422" font-size="28" font-weight="800" fill="#0CC0DF" text-anchor="middle">90</text>
    <text x="366" y="448" font-size="12" font-weight="500" fill="rgba(255,255,255,0.40)" text-anchor="middle">Day first sale guarantee</text>

    <!-- Stat 3 -->
    <rect x="472" y="390" width="180" height="74" rx="10" fill="rgba(12,192,223,0.08)" stroke="rgba(12,192,223,0.20)" stroke-width="1"/>
    <text x="562" y="422" font-size="28" font-weight="800" fill="#0CC0DF" text-anchor="middle">50+</text>
    <text x="562" y="448" font-size="12" font-weight="500" fill="rgba(255,255,255,0.40)" text-anchor="middle">Marketplaces</text>
  </g>

  <!-- CTA pill -->
  <rect x="80" y="508" width="240" height="44" rx="8" fill="#0CC0DF"/>
  <text x="200" y="536" font-size="15" font-weight="700" fill="#0A0F1E" text-anchor="middle">Book Free Strategy Call</text>

  <!-- Domain -->
  <text x="1120" y="580" font-size="14" font-weight="500" fill="rgba(255,255,255,0.28)" text-anchor="end">thejuggernautglobal.com</text>
</svg>
